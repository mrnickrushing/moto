name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Install Yarn
        run: npm install --global yarn@1.22.22

      - name: Install locked dependencies
        run: yarn install --frozen-lockfile --network-timeout 600000

      - name: Build production frontend
        run: yarn build
        env:
          CI: true
          REACT_APP_BACKEND_URL: ""

      - name: Block production dependency advisories
        run: yarn audit --groups dependencies

  backend:
    name: Backend validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-deploy.txt

      - name: Install production dependencies
        run: python -m pip install -r backend/requirements-deploy.txt

      - name: Audit production dependencies
        run: |
          python -m pip install pip-audit
          python -m pip_audit -r backend/requirements-deploy.txt

      - name: Run security unit tests
        run: PYTHONPATH=backend python -m unittest discover -s backend/tests -p 'test_*security*.py'

      - name: Compile backend
        run: python -m compileall -q backend

      - name: Import FastAPI application
        run: python -c "import sys; sys.path.insert(0, 'backend'); import server; assert server.app"
        env:
          MONGO_URL: mongodb://127.0.0.1:27017
          DB_NAME: moto_ci
          JWT_SECRET: ci-only-secret-that-is-never-used-outside-this-validation
          FRONTEND_URL: http://localhost:3000
